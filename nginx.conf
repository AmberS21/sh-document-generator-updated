server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    # Basic hardening headers for static content.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Keep HTML fresh while allowing browser caching for other assets.
    location = /index.html {
        add_header Cache-Control "no-store";
    }

    # Serve static files and fallback to index for SPA-like routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Template/source files used by the app should not be cached.
    location ~* \.(docx|docm|xlsx)$ {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok";
    }
}